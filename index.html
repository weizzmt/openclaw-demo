<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpenClaw 专业部署</title>
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
<div class="container">
  <h1 class="main-title">open claw</h1>
  <p class="subtitle">1V1专业部署、让“龙虾”真有用</p>

  <div class="features">
    <div class="feature-item">
      <span class="feature-key">无忧</span>——1V1安装服务，零障碍安装；
    </div>
    <div class="feature-item">
      <span class="feature-key">安全</span>——1V1安全指导，让“龙虾”不捣乱；
    </div>
    <div class="feature-item">
      <span class="feature-key">助养</span>——1V1技能训练，让“龙虾”真工作；
    </div>
    <div class="feature-item">
      <span class="feature-key">省钱</span>——1V1费用规划，让“龙虾”不乱花钱。
    </div>
  </div>

  <!-- 跳转按钮 -->
  <div class="cta-section">
    <a href="content.html" class="cta-button">看看你的问题</a>
  </div>

  <button id="backToTop" class="back-to-top">顶部</button>
</div>

<script>
  // 返回顶部功能
  document.getElementById('backToTop').addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  window.addEventListener('scroll', () => {
    const btn = document.getElementById('backToTop');
    btn.style.display = window.scrollY > 300 ? 'block' : 'none';
  });
</script>
</body>
</html>
