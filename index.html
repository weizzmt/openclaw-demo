<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OpenClaw 专业部署</title>
  <!-- 公共样式：导航栏 -->
  <link rel="stylesheet" href="css/common.css" />
  <!-- 首页专属样式 -->
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>

<!-- 响应式导航栏 -->
<nav class="navbar">
  <div class="nav-brand">OpenClaw</div>
  <button class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">首页</a></li>
    <li><a href="content.html">内容</a></li>
    <li><a href="service.html">服务</a></li>
    <li><a href="guarantee.html">服务承诺</a></li>
    <li><a href="price.html">价格</a></li>
    <li><a href="order.html">下单流程</a></li>
  </ul>
</nav>

<div class="container">
  <h1 class="main-title">open claw</h1>
  <p class="subtitle">1V1专业部署，让“龙虾”真有用</p>

  <div class="features">
    <div class="feature-item">
      <span class="feature-key">无忧</span>——1V1安装服务，零障碍安装；
    </div>
    <div class="feature-item">
      <span class="feature-key">安全</span>——1V1安全指导，让“龙虾”不捣乱；
    </div>
    <div class="feature-item">
      <span class="feature-key">助养</span>——1V1技能训练，让“龙虾”真工作；
    </div>
    <div class="feature-item">
      <span class="feature-key">省钱</span>——1V1费用规划，让“龙虾”不乱花钱。
    </div>
  </div>

  <!-- 跳转按钮 -->
  <div class="cta-section">
    <a href="content.html" class="cta-button">看看你的问题</a>
  </div>

  <button id="backToTop" class="back-to-top">顶部</button>
</div>

<script>
  // 汉堡菜单控制
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');

  if (hamburger && navLinks) {
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('active');

      const spans = hamburger.querySelectorAll('span');
      if (navLinks.classList.contains('active')) {
        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
        spans[1].style.opacity = '0';
        spans[2].style.transform = 'rotate(-45deg) translate(7px, -7px)';
      } else {
        spans[0].style.transform = 'rotate(0) translate(0, 0)';
        spans[1].style.opacity = '1';
        spans[2].style.transform = 'rotate(0) translate(0, 0)';
      }
    });

    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('active');
        const spans = hamburger.querySelectorAll('span');
        spans[0].style.transform = 'rotate(0) translate(0, 0)';
        spans[1].style.opacity = '1';
        spans[2].style.transform = 'rotate(0) translate(0, 0)';
      });
    });
  }

  // 返回顶部
  const backToTopBtn = document.getElementById('backToTop');
  if (backToTopBtn) {
    backToTopBtn.onclick = function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.addEventListener('scroll', function () {
      backToTopBtn.style.display = window.pageYOffset > 300 ? 'block' : 'none';
    });
  }
</script>
</body>
</html>
