<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw 服务内容</title>
  <!-- 公共导航样式 -->
  <link rel="stylesheet" href="css/common.css" />
  <!-- 本页专属样式 -->
  <link rel="stylesheet" href="css/service.css" />
</head>
<body>

<!-- 响应式导航栏 -->
<nav class="navbar">
  <div class="nav-brand">OpenClaw</div>
  <button class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">首页</a></li>
    <li><a href="content.html">内容</a></li>
    <li><a href="service.html">服务</a></li>
    <li><a href="guarantee.html">服务承诺</a></li>
    <li><a href="price.html">价格</a></li>
    <li><a href="order.html">下单流程</a></li>
  </ul>
</nav>

<div class="service-page">
  <div class="header">
    <h1 class="logo">OpenClaw</h1>
    <p class="slogan">为你解决所有难题</p>
  </div>

  <!-- 图片区域 -->
  <div class="image-container">
    <img src="https://via.placeholder.com/600x400/1a0033/ffffff?text=AI+Tech+Support" alt="AI 技术支持" class="demo-image" />
  </div>

  <!-- 服务列表 -->
  <div class="services-list">
    <div class="service-item">
      <span class="step">01</span>
      <h3>零技术门槛</h3>
      <p>聊天发指令即可使用，我们帮您部署配置，开箱即用</p>
    </div>
    <div class="service-item">
      <span class="step">02</span>
      <h3>本地运行安全</h3>
      <p>数据全程存储在您的电脑上，不上传云端，隐私绝对安全</p>
    </div>
    <div class="service-item">
      <span class="step">03</span>
      <h3>AI 自动化</h3>
      <p>根据您的需求定制功能，真正实现您的AI私人助理</p>
    </div>
    <div class="service-item">
      <span class="step">04</span>
      <h3>有记忆不失忆</h3>
      <p>成熟记忆解决方案，让您的AI能记住不忘事</p>
    </div>
    <div class="service-item">
      <span class="step">05</span>
      <h3>专业服务</h3>
      <p>包安装、包配置、包服务，终身免费远程指导和技术支持</p>
    </div>
  </div>

  <div class="next-step">
    <a href="guarantee.html" class="next-button">查看服务承诺 →</a>
  </div>

  <!-- 返回顶部按钮 -->
  <button id="backToTop" class="back-to-top">顶部</button>
</div>

<!-- 导航 & 返回顶部脚本 -->
<script>
  // 汉堡菜单控制
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');

  if (hamburger && navLinks) {
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('active');

      const spans = hamburger.querySelectorAll('span');
      if (navLinks.classList.contains('active')) {
        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
        spans[1].style.opacity = '0';
        spans[2].style.transform = 'rotate(-45deg) translate(7px, -7px)';
      } else {
        spans[0].style.transform = 'rotate(0) translate(0, 0)';
        spans[1].style.opacity = '1';
        spans[2].style.transform = 'rotate(0) translate(0, 0)';
      }
    });

    // 点击链接后自动收起菜单
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('active');
        const spans = hamburger.querySelectorAll('span');
        spans[0].style.transform = 'rotate(0) translate(0, 0)';
        spans[1].style.opacity = '1';
        spans[2].style.transform = 'rotate(0) translate(0, 0)';
      });
    });
  }

  // 返回顶部
  const backToTopBtn = document.getElementById('backToTop');
  if (backToTopBtn) {
    backToTopBtn.onclick = function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.addEventListener('scroll', function () {
      backToTopBtn.style.display = window.pageYOffset > 300 ? 'block' : 'none';
    });
  }
</script>

</body>
</html>
