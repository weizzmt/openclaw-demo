<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你是不是也这样？</title>
  <link rel="stylesheet" href="css/content.css" /></head>
<body>

<div class="content-page">
  <!-- 页标题 -->
  <h1 class="page-title">你是不是也这样？</h1>

  <!-- 痛点卡片网格 -->
  <div class="pain-points-grid">
    <a href="service.html" class="pain-point-card">
      <h3 class="card-title">不会写代码？</h3>
      <p class="card-desc">想做自动化却无从下手，技术门槛太高让人望而却步</p>
    </a>

    <a href="service.html" class="pain-point-card">
      <h3 class="card-title">担心隐私泄露？</h3>
      <p class="card-desc">云端 AI 让你担心个人和客户数据安全，不敢上传敏感信息</p>
    </a>

    <a href="service.html" class="pain-point-card">
      <h3 class="card-title">浪费大量时间？</h3>
      <p class="card-desc">每天重复整理文件、写周报、盯订单，效率低下身心疲惫</p>
    </a>

    <a href="service.html" class="pain-point-card">
      <h3 class="card-title">遇到问题没人管？</h3>
      <p class="card-desc">软件装不好、不会用，找不到专业支持和技术指导</p>
    </a>
  </div>

  <!-- 放在 .pain-points-grid 下方 -->
  <div class="back-home">
    <a href="index.html" class="back-button">← 返回首页</a>
  </div>

  <!-- 返回顶部按钮 -->
  <button id="backToTop" class="back-to-top">顶部</button>
</div>

<script>
  // 返回顶部功能
  document.getElementById('backToTop').onclick = function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.addEventListener('scroll', function () {
    const btn = document.getElementById('backToTop');
    btn.style.display = window.pageYOffset > 300 ? 'block' : 'none';
  });
</script>

</body>
</html>
